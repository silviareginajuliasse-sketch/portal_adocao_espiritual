<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionar Integrantes da Equipe - Adoção Espiritual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --primary-red: #8b1e1e;
            --text-dark: #333;
            --text-gray: #777;
            --border-light: #ddd;
            --bg-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .modal-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 700px;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            color: #777;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--primary-red);
        }

        /* Header Area */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 500;
            color: #777;
        }

        .search-container {
            width: 220px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #333;
            outline: none;
            font-style: italic;
        }

        .search-input::placeholder {
            color: #999;
        }

        .header-divider {
            height: 2px;
            background-color: var(--primary-red);
            width: 100%;
            margin-bottom: 20px;
        }

        /* List Area */
        .collaborators-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        .collaborators-list::-webkit-scrollbar {
            width: 6px;
        }

        .collaborators-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .collaborators-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .collaborators-list::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-item:hover {
            background-color: #f9f9f9;
        }

        /* Custom Checkbox */
        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 1px solid #777;
            border-radius: 3px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            background-color: white;
            transition: all 0.2s;
        }

        .list-item.selected .custom-checkbox {
            background-color: #eee;
            border-color: #555;
        }

        .list-item.selected .custom-checkbox::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 10px;
            color: #333;
        }

        .item-text {
            font-size: 1.1rem;
            color: #777;
            font-weight: 400;
            white-space: nowrap;
        }

        /* Footer Area */
        .modal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-logo img {
            width: 32px;
            height: 32px;
        }

        .footer-logo-text {
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1.1;
            color: #000;
        }

        .save-btn {
            background-color: #ae3326;
            color: white;
            border: none;
            padding: 12px 45px;
            border-radius: 30px;
            font-size: 1.3rem;
            font-weight: 600;
            font-style: italic;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .save-btn:hover {
            background-color: #8b1e1e;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>

    <div class="modal-container">
        <i class="fa-solid fa-xmark close-btn" onclick="goBack()"></i>

        <div id="project-title-container" style="margin-bottom: 15px; border-bottom: 1px dashed var(--border-light); padding-bottom: 10px;">
            <span style="font-size: 0.85rem; color: var(--primary-red); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">PROJETO</span>
            <h3 id="project-title-text" style="font-size: 1.25rem; color: #333; font-weight: 700; margin-top: 2px;">--</h3>
        </div>

        <div class="modal-header">
            <h2 class="modal-title">Integrantes da Equipe</h2>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="busca" id="search-input" onkeyup="filterList()">
            </div>
        </div>

        <div class="header-divider"></div>

        <div class="collaborators-list" id="collaborators-list">
            <!-- Dynamically populated -->
        </div>

        <div class="modal-footer">
            <div class="footer-logo">
                <img src="./logo_circular.png" alt="Logo">
                <div class="footer-logo-text">Adoção<br>Espiritual</div>
            </div>
            <button class="save-btn" onclick="saveSelection()">Salvar</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.protocol === 'file:'
            ? `http://${window.location.hostname || 'localhost'}:3000/api`
            : '/api';

        const urlParams = new URLSearchParams(window.location.search);
        const idProjeto = urlParams.get('id_projeto');
        const nome = urlParams.get('nome') || '';
        const cpf = urlParams.get('cpf') || '';

        let currentTeamIds = new Set();

        document.addEventListener('DOMContentLoaded', async () => {
            if (!idProjeto) {
                alert("Erro: ID do projeto não encontrado na URL.");
                return;
            }
            await loadProjectDetails();
            await loadCurrentTeam();
            await loadCollaborators();
        });

        async function loadProjectDetails() {
            try {
                const response = await fetch(`${API_URL}/projetos/${idProjeto}`);
                if (response.ok) {
                    const p = await response.json();
                    document.getElementById('project-title-text').innerText = p.nome_projeto || '--';
                }
            } catch (err) {
                console.error('Erro ao carregar detalhes do projeto:', err);
            }
        }

        async function loadCurrentTeam() {
            try {
                const response = await fetch(`${API_URL}/projetos/${idProjeto}/equipe`);
                if (response.ok) {
                    const team = await response.json();
                    team.forEach(member => {
                        currentTeamIds.add(member.id_colaborador);
                    });
                }
            } catch (err) {
                console.error('Erro ao carregar equipe atual:', err);
            }
        }

        async function loadCollaborators() {
            const listContainer = document.getElementById('collaborators-list');
            listContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: #777;">Carregando colaboradores...</div>';

            try {
                const responseColab = await fetch(`${API_URL}/colaboradores`);
                if (!responseColab.ok) throw new Error('Erro ao carregar colaboradores');
                const colaboradores = await responseColab.json();

                listContainer.innerHTML = '';
                
                // Sort collaborators by name
                colaboradores.sort((a, b) => a.nome_colaborador.localeCompare(b.nome_colaborador));

                colaboradores.forEach(c => {
                    // Check if collaborator is active
                    if (c.status && c.status.toLowerCase() !== 'ativo') {
                        return;
                    }

                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.dataset.idColaborador = c.id_colaborador;
                    item.onclick = () => toggleSelection(item);

                    // Check if they are already in the team
                    if (currentTeamIds.has(c.id_colaborador)) {
                        item.classList.add('selected');
                    }

                    const checkbox = document.createElement('div');
                    checkbox.className = 'custom-checkbox';

                    const span = document.createElement('span');
                    span.className = 'item-text';
                    
                    const sigla = c.sigla_estado || '';
                    const cidadeEst = [c.cidade, sigla].filter(Boolean).join(' - ');
                    
                    span.textContent = `${c.id_colaborador} - ${c.nome_colaborador}${cidadeEst ? ` - ${cidadeEst}` : ''}`;

                    item.appendChild(checkbox);
                    item.appendChild(span);
                    listContainer.appendChild(item);
                });

                if (listContainer.children.length === 0) {
                    listContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: #777;">Nenhum colaborador ativo encontrado.</div>';
                }
            } catch (err) {
                console.error(err);
                listContainer.innerHTML = '<div style="padding: 20px; text-align: center; color: #8b1e1e;">Erro ao carregar lista de colaboradores.</div>';
            }
        }

        function toggleSelection(element) {
            element.classList.toggle('selected');
        }

        function filterList() {
            const input = document.getElementById('search-input');
            const filter = input.value.toLowerCase();
            const list = document.getElementById('collaborators-list');
            const items = list.getElementsByClassName('list-item');

            const terms = filter.split(',').map(term => term.trim()).filter(term => term.length > 0);

            for (let i = 0; i < items.length; i++) {
                const text = items[i].getElementsByClassName('item-text')[0].innerText.toLowerCase();
                
                if (terms.length === 0) {
                    items[i].style.display = "";
                    continue;
                }

                const matchesAny = terms.some(term => text.includes(term));
                
                if (matchesAny) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        function goBack() {
            window.location.href = `inclusao_projeto.html?mode=edit&id=${idProjeto}&nome=${encodeURIComponent(nome)}&cpf=${encodeURIComponent(cpf)}&tab=tab-equipe&_t=${Date.now()}`;
        }

        async function saveSelection() {
            const selected = document.querySelectorAll('.list-item.selected');
            const collaboratorIds = Array.from(selected).map(item => parseInt(item.dataset.idColaborador, 10));
            
            try {
                const saveBtn = document.querySelector('.save-btn');
                saveBtn.disabled = true;
                saveBtn.innerText = 'Salvando...';

                const response = await fetch(`${API_URL}/projetos/${idProjeto}/equipe`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ colaboradores: collaboratorIds })
                });

                const result = await response.json();
                if (response.ok && result.success) {
                    alert("Integrantes da equipe salvos com sucesso!");
                    goBack();
                } else {
                    alert("Erro ao salvar integrantes da equipe: " + (result.error || 'Erro desconhecido.'));
                    saveBtn.disabled = false;
                    saveBtn.innerText = 'Salvar';
                }
            } catch (err) {
                console.error('Erro ao salvar integrantes da equipe:', err);
                alert('Erro de conexão ao salvar integrantes da equipe.');
                const saveBtn = document.querySelector('.save-btn');
                saveBtn.disabled = false;
                saveBtn.innerText = 'Salvar';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecionar Colaboradores Adoção Espiritual</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --primary-red: #8b1e1e;
            --text-dark: #333;
            --text-gray: #777;
            --border-light: #ddd;
            --bg-white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .modal-container {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 580px;
            border-radius: 8px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.3rem;
            color: #333;
            cursor: pointer;
            text-decoration: none;
            font-weight: normal;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: var(--primary-red);
        }

        /* Header Area */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            margin-top: 10px;
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 500;
            color: #777;
        }

        .search-container {
            width: 220px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            color: #333;
            outline: none;
            font-style: italic;
        }

        .search-input::placeholder {
            color: #999;
        }

        /* List Area */
        .collaborators-list {
            border: 1px solid #ddd;
            border-radius: 6px;
            max-height: 380px;
            overflow-y: auto;
            margin-bottom: 25px;
            padding: 10px;
            background-color: #fff;
        }

        /* Custom Scrollbar */
        .collaborators-list::-webkit-scrollbar {
            width: 6px;
        }

        .collaborators-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .collaborators-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .collaborators-list::-webkit-scrollbar-thumb:hover {
            background: #bbb;
        }

        .list-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item:hover {
            background-color: #f9f9f9;
        }

        /* Custom Checkbox conforming to design mockup */
        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 1px solid #b5b5b5;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            background-color: white;
            transition: all 0.2s;
        }

        .list-item.selected .custom-checkbox {
            background-color: var(--primary-red);
            border-color: var(--primary-red);
        }

        .list-item.selected .custom-checkbox::after {
            content: "\f00c";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            font-size: 11px;
            color: #ffffff;
        }

        .item-text {
            font-size: 1.05rem;
            color: #666;
            font-weight: 400;
        }

        /* Footer Area */
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .save-btn {
            background-color: #8b1e1e;
            color: white;
            border: none;
            padding: 12px 50px;
            border-radius: 30px;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .save-btn:hover {
            background-color: #721818;
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="modal-container">
        <a href="javascript:void(0)" class="close-btn" onclick="closePopup()">X</a>

        <div class="modal-header">
            <h2 class="modal-title">Colaboradores Adoção Espiritual *</h2>
            <div class="search-container">
                <input type="text" class="search-input" placeholder="busca" id="search-input" onkeyup="filterList()">
            </div>
        </div>

        <div class="collaborators-list" id="collaborators-list">
            <!-- Dynamically populated -->
        </div>

        <div class="modal-footer">
            <button class="save-btn" onclick="saveSelection()">SALVAR</button>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id_paroquia = urlParams.get('id_paroquia');
        const selectLider = urlParams.get('select_lider') === 'true';
        
        let allCollaborators = [];
        let selectedColabIds = new Set();

        function closePopup() {
            if (window.self !== window.top) {
                window.parent.postMessage({ action: 'close' }, '*');
            } else {
                window.history.back();
            }
        }

        function toggleSelection(element) {
            const colabId = parseInt(element.getAttribute('data-id'));
            if (selectLider) {
                // Radio-like behavior for single selection
                const previouslySelected = document.querySelector('.list-item.selected');
                if (previouslySelected && previouslySelected !== element) {
                    previouslySelected.classList.remove('selected');
                }
                selectedColabIds.clear();
                if (element.classList.contains('selected')) {
                    element.classList.remove('selected');
                } else {
                    element.classList.add('selected');
                    selectedColabIds.add(colabId);
                }
            } else {
                // Original multiselect behavior
                if (element.classList.contains('selected')) {
                    element.classList.remove('selected');
                    selectedColabIds.delete(colabId);
                } else {
                    element.classList.add('selected');
                    selectedColabIds.add(colabId);
                }
            }
        }

        function filterList() {
            const input = document.getElementById('search-input');
            const filter = input.value.toLowerCase();
            const list = document.getElementById('collaborators-list');
            const items = list.getElementsByClassName('list-item');

            for (let i = 0; i < items.length; i++) {
                const text = items[i].getElementsByClassName('item-text')[0].innerText.toLowerCase();
                if (text.indexOf(filter) > -1) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        async function loadData() {
            if (!id_paroquia && !selectLider) {
                alert("Erro: ID da paróquia ausente na URL.");
                return;
            }

            try {
                if (!selectLider) {
                    // Fetch already linked coordinators for the parish
                    const linkedCoordinators = await fetchData(`paroquias/${id_paroquia}/coordenadores`);
                    linkedCoordinators.forEach(c => {
                        selectedColabIds.add(c.id_colaborador);
                    });
                }

                // Fetch all collaborators and filter to active ones (status === 'ativo' or 'Ativo')
                let collaborators = [];
                try {
                    collaborators = await fetchData('colaboradores');
                } catch (err) {
                    console.warn("Could not fetch collaborators from database, using mock data.", err);
                }

                if (!collaborators || collaborators.length === 0) {
                    // Provide fallback mock data for testing offline/static layout
                    collaborators = [
                        { id_colaborador: 1, nome_colaborador: "Silvia Regina Juliasse", status: "Ativo", nome_paroquia: "Paróquia São José" },
                        { id_colaborador: 2, nome_colaborador: "Moacyr Caparroz", status: "Ativo", nome_paroquia: "Paróquia Nossa Senhora da Paz" },
                        { id_colaborador: 3, nome_colaborador: "Ana Paula Silva", status: "Ativo", nome_paroquia: "Paróquia São Pedro" },
                        { id_colaborador: 4, nome_colaborador: "Carlos Eduardo Oliveira", status: "Ativo", nome_paroquia: "Catedral Metropolitana" },
                        { id_colaborador: 5, nome_colaborador: "Maria de Fátima Souza", status: "Ativo", nome_paroquia: "Paróquia Santo Antônio" }
                    ];
                }

                // Filter active ones
                allCollaborators = collaborators.filter(c => c.status && c.status.toLowerCase() === 'ativo');

                const listContainer = document.getElementById('collaborators-list');
                listContainer.innerHTML = '';

                if (allCollaborators.length === 0) {
                    listContainer.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">Nenhum colaborador ativo cadastrado no sistema.</div>';
                    return;
                }

                allCollaborators.forEach(c => {
                    const isSelected = selectedColabIds.has(c.id_colaborador);
                    const div = document.createElement('div');
                    div.className = `list-item${isSelected ? ' selected' : ''}`;
                    div.setAttribute('data-id', c.id_colaborador);
                    div.onclick = () => toggleSelection(div);

                    const parishSuffix = c.nome_paroquia ? ` - ${c.nome_paroquia}` : '';

                    div.innerHTML = `
                        <div class="custom-checkbox"></div>
                        <span class="item-text">${c.nome_colaborador}${parishSuffix}</span>
                    `;
                    listContainer.appendChild(div);
                });
            } catch (err) {
                console.error("Erro ao carregar dados dos colaboradores:", err);
            }
        }

        async function saveSelection() {
            if (selectLider) {
                const selectedItem = document.querySelector('.list-item.selected');
                if (!selectedItem) {
                    alert("Por favor, selecione um colaborador.");
                    return;
                }
                const colabId = parseInt(selectedItem.getAttribute('data-id'));
                const colabName = selectedItem.querySelector('.item-text').innerText.split(' - ')[0]; // strip parish suffix

                if (window.self !== window.top) {
                    window.parent.postMessage({
                        action: 'selectLider',
                        id_colaborador: colabId,
                        nome_colaborador: colabName
                    }, '*');
                } else {
                    localStorage.setItem('temp_selected_lider', JSON.stringify({ id_colaborador: colabId, nome_colaborador: colabName }));
                    window.history.back();
                }
                return;
            }

            if (!id_paroquia) return;

            const selectedArray = Array.from(selectedColabIds);
            
            // Build the payload
            const payload = {
                id_paroquia: parseInt(id_paroquia),
                coordenadores: selectedArray
            };

            try {
                const response = await postData('paroquia_coordenadores/save', payload);
                if (response.success) {
                    // Update localStorage
                    const formattedCoordinators = allCollaborators
                        .filter(c => selectedColabIds.has(c.id_colaborador))
                        .map(c => ({
                            id_colaborador: c.id_colaborador,
                            nome_colaborador: c.nome_colaborador,
                            status: c.status
                        }));

                    localStorage.setItem('temp_paroquia_coordenadores', JSON.stringify(formattedCoordinators));
                    alert("Colaboradores salvos com sucesso!");
                    window.history.back();
                } else {
                    alert("Erro ao salvar colaboradores: " + (response.error || "Erro desconhecido"));
                }
            } catch (error) {
                console.error("Erro ao salvar colaboradores no banco:", error);
                alert("Erro ao salvar colaboradores no banco de dados.");
            }
        }

        window.onload = loadData;
    </script>
</body>

</html>
